spring:
  application:
    name: club-management-api

  datasource:
    url: jdbc:postgresql://localhost:5432/clubdb
    username: clubuser
    password: clubpass123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs